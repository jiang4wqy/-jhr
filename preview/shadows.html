<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Shadows</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 28px; }
  .card { display: flex; flex-direction: column; gap: 16px; }
  .scale { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .step { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .chip { width: 100%; height: 72px; background: #fff; border-radius: var(--tc-r-md); }
  .step .n { font-family: var(--tc-font-mono); font-size: 10px; color: var(--tc-fg-2); font-weight: 600; }
  .step .v { font-family: var(--tc-font-mono); font-size: 9px; color: var(--tc-fg-3); }
  .note { font-family: var(--tc-font-sans); font-size: 12px; color: var(--tc-fg-3); }
</style>
</head>
<body>
  <div class="card">
    <div class="scale">
      <div class="step"><div class="chip" style="box-shadow: 0 1px 2px rgba(122,64,32,0.06)"></div><span class="n">shadow-1</span><span class="v">hairline</span></div>
      <div class="step"><div class="chip" style="box-shadow: 0 4px 12px rgba(122,64,32,0.08), 0 1px 2px rgba(122,64,32,0.04)"></div><span class="n">shadow-2</span><span class="v">card hover</span></div>
      <div class="step"><div class="chip" style="box-shadow: 0 12px 32px rgba(122,64,32,0.12), 0 2px 6px rgba(122,64,32,0.06)"></div><span class="n">shadow-3</span><span class="v">floating</span></div>
      <div class="step"><div class="chip" style="box-shadow: 0 24px 60px rgba(122,64,32,0.16), 0 6px 12px rgba(122,64,32,0.08)"></div><span class="n">shadow-4</span><span class="v">modal</span></div>
    </div>
    <div class="note">All shadows use a <strong style="color:var(--tc-fg-1)">warm peach-brown alpha</strong> (rgba 122,64,32) — never neutral grey/black.</div>
  </div>
</body>
</html>
