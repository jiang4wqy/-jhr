<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Colors — Soft accents (hobby tags)</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px; }
  .card { display: flex; flex-direction: column; gap: 14px; }
  .row-c { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .step { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; }
  .chip { width: 100%; height: 72px; border-radius: var(--tc-r-md); border: 1px solid var(--tc-border-1); display: flex; align-items: center; justify-content: center; font-family: var(--tc-font-sans); font-size: 14px; font-weight: 500; }
  .step .n { font-family: var(--tc-font-mono); font-size: 10px; color: var(--tc-fg-2); font-weight: 600; }
  .step .v { font-family: var(--tc-font-mono); font-size: 9px; color: var(--tc-fg-3); }
  .note { font-family: var(--tc-font-sans); font-size: 12px; color: var(--tc-fg-3); }
</style>
</head>
<body>
  <div class="card">
    <div class="row-c">
      <div class="step"><div class="chip" style="background:#8AA68C; color:#fff">户外 · nature</div><span class="n">sage</span><span class="v">#8AA68C</span></div>
      <div class="step"><div class="chip" style="background:#8AB6D6; color:#fff">学术 · academic</div><span class="n">sky</span><span class="v">#8AB6D6</span></div>
      <div class="step"><div class="chip" style="background:#B086B5; color:#fff">艺术 · arts</div><span class="n">plum</span><span class="v">#B086B5</span></div>
      <div class="step"><div class="chip" style="background:#E0B870; color:#fff">荣誉 · honor</div><span class="n">honey</span><span class="v">#E0B870</span></div>
    </div>
    <div class="note">Soft accents are used <strong style="color:var(--tc-fg-1)">only</strong> on hobby/category tags. Muted, never saturated. Never compete with peach.</div>
  </div>
</body>
</html>
