<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Type — Display</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px; }
  .card { display: flex; flex-direction: column; gap: 18px; }
  .display {
    font-family: var(--tc-font-display);
    font-weight: 500;
    font-size: 64px;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--tc-fg-1);
  }
  .display em { font-style: italic; font-weight: 400; color: var(--tc-peach-600); }
  .display .cn { font-family: var(--tc-font-serif); }
  .meta-row { display: flex; gap: 20px; font-family: var(--tc-font-mono); font-size: 11px; color: var(--tc-fg-3); }
  .meta-row span strong { color: var(--tc-fg-2); font-family: var(--tc-font-sans); font-weight: 600; }
</style>
</head>
<body>
  <div class="card">
    <div class="display"><span class="cn">慢一点，</span><em>sincerely</em>.</div>
    <div class="meta-row">
      <span><strong>Family</strong> Fraunces · Noto Serif SC</span>
      <span><strong>Weight</strong> 500 / italic 400</span>
      <span><strong>Size</strong> 60–80px</span>
      <span><strong>Tracking</strong> −0.02em</span>
    </div>
  </div>
</body>
</html>
