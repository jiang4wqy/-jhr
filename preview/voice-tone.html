<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Voice & tone</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px; }
  .card { display: flex; flex-direction: column; gap: 12px; font-family: var(--tc-font-sans); }
  .row-v { display: grid; grid-template-columns: 100px 1fr 1fr; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--tc-border-1); align-items: center; }
  .row-v:last-child { border-bottom: none; }
  .row-v .where { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--tc-fg-3); }
  .row-v .bad { color: var(--tc-ink-500); text-decoration: line-through; text-decoration-color: var(--tc-error); font-size: 13px; }
  .row-v .good { color: var(--tc-ink-900); font-size: 14px; font-weight: 500; }
  .row-v .good em { font-family: var(--tc-font-serif); font-style: italic; color: var(--tc-peach-600); font-weight: 400; }
</style>
</head>
<body>
  <div class="card">
    <div class="row-v"><span class="where">CTA</span><span class="bad">立即注册</span><span class="good">加入同窗</span></div>
    <div class="row-v"><span class="where">Like</span><span class="bad">心动</span><span class="good">想认识</span></div>
    <div class="row-v"><span class="where">Send</span><span class="bad">发送</span><span class="good">说你好</span></div>
    <div class="row-v"><span class="where">Header</span><span class="bad">找到真命天子！💕</span><span class="good">慢一点，<em>sincerely</em></span></div>
  </div>
</body>
</html>
