<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Colors — Rose accent</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px; }
  .card { display: flex; flex-direction: column; gap: 14px; }
  .scale { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .step { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 64px; border-radius: var(--tc-r-sm); border: 1px solid var(--tc-border-1); }
  .step .n { font-family: var(--tc-font-mono); font-size: 10px; color: var(--tc-fg-2); font-weight: 600; }
  .step .v { font-family: var(--tc-font-mono); font-size: 9px; color: var(--tc-fg-3); }
  .note { font-family: var(--tc-font-sans); font-size: 12px; color: var(--tc-fg-3); }
</style>
</head>
<body>
  <div class="card">
    <div class="scale">
      <div class="step"><div class="chip" style="background:#FFF1F3"></div><span class="n">50</span><span class="v">#FFF1F3</span></div>
      <div class="step"><div class="chip" style="background:#FFDCE2"></div><span class="n">100</span><span class="v">#FFDCE2</span></div>
      <div class="step"><div class="chip" style="background:#FFB4C0"></div><span class="n">200</span><span class="v">#FFB4C0</span></div>
      <div class="step"><div class="chip" style="background:#FF859A"></div><span class="n">300</span><span class="v">#FF859A</span></div>
      <div class="step"><div class="chip" style="background:#F25E78"></div><span class="n">400</span><span class="v">#F25E78</span></div>
      <div class="step"><div class="chip" style="background:#E03E5F"></div><span class="n" style="color:#B82A48">500★</span><span class="v">#E03E5F</span></div>
      <div class="step"><div class="chip" style="background:#B82A48"></div><span class="n">600</span><span class="v">#B82A48</span></div>
    </div>
    <div class="note"><strong style="color:var(--tc-fg-1)">Rose</strong> · accent. Used <em>only</em> for the heart / 想认识 action — never as a brand color.</div>
  </div>
</body>
</html>
