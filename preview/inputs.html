<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Inputs</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px; }
  .card { display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--tc-fg-2); letter-spacing: 0.04em; }
  .input, .textarea {
    font-family: var(--tc-font-sans);
    font-size: 15px;
    padding: 12px 14px;
    border: 1px solid var(--tc-cream-300);
    background: #fff;
    color: var(--tc-ink-900);
    border-radius: 12px;
    transition: all 180ms;
    width: 100%;
  }
  .input:focus, .textarea:focus { outline: none; border-color: var(--tc-peach-500); box-shadow: 0 0 0 4px rgba(244,117,74,0.18); }
  .input::placeholder { color: var(--tc-ink-300); }
  .textarea { font-family: var(--tc-font-serif); font-style: italic; line-height: 1.6; resize: none; min-height: 80px; }
  .row-i { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style>
</head>
<body>
  <div class="card">
    <div class="row-i">
      <div class="field"><label>姓名 / Name</label><input class="input" value="林安"></div>
      <div class="field"><label>学校 / School</label><input class="input" placeholder="搜索你的学校…"></div>
    </div>
    <div class="field">
      <label>讲讲你自己 / About you</label>
      <textarea class="textarea" placeholder="不用太完美 — 写一两段最近在想的事。">我喜欢在图书馆三楼靠窗的位置看书，最近在重读《人间词话》。</textarea>
    </div>
  </div>
</body>
</html>
