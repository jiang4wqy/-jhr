<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Logo</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px; }
  .card { display: flex; flex-direction: column; gap: 20px; }
  .logo-row { display: flex; gap: 24px; align-items: center; }
  .logo-tile {
    flex: 1;
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--tc-r-md);
    border: 1px solid var(--tc-border-1);
  }
  .logo-tile.light { background: var(--tc-bg-1); }
  .logo-tile.dark { background: var(--tc-ink-900); }
  .logo-tile.brand { background: var(--tc-peach-500); }
  .logo-tile img { max-width: 80%; max-height: 70%; }
  .mark-row { display: flex; gap: 16px; align-items: center; }
  .mark-row img { height: 56px; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <div class="logo-tile light">
        <img src="../assets/logo/wordmark-light.svg" alt="">
      </div>
      <div class="logo-tile dark">
        <img src="../assets/logo/wordmark-dark.svg" alt="">
      </div>
    </div>
    <div class="mark-row">
      <img src="../assets/logo/mark.svg" alt="">
      <div>
        <div class="swatch-name">App mark · 同</div>
        <div class="swatch-value">Use at ≥32px. Pairs with wordmark or stands alone in tight spaces.</div>
      </div>
    </div>
  </div>
</body>
</html>
