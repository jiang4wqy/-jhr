<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Colors — Cream & Ink neutrals</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px; }
  .card { display: flex; flex-direction: column; gap: 16px; }
  .scale { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .step { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 56px; border-radius: var(--tc-r-sm); border: 1px solid var(--tc-border-1); }
  .step .n { font-family: var(--tc-font-mono); font-size: 10px; color: var(--tc-fg-2); font-weight: 600; }
  .step .v { font-family: var(--tc-font-mono); font-size: 9px; color: var(--tc-fg-3); }
  .group-label { font-family: var(--tc-font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--tc-fg-3); }
</style>
</head>
<body>
  <div class="card">
    <div class="group-label">Cream · backgrounds, surfaces, borders</div>
    <div class="scale">
      <div class="step"><div class="chip" style="background:#FDFAF6"></div><span class="n">50</span><span class="v">#FDFAF6</span></div>
      <div class="step"><div class="chip" style="background:#F8F1E8"></div><span class="n">100</span><span class="v">#F8F1E8</span></div>
      <div class="step"><div class="chip" style="background:#EFE3D2"></div><span class="n">200</span><span class="v">#EFE3D2</span></div>
      <div class="step"><div class="chip" style="background:#DDC9AE"></div><span class="n">300</span><span class="v">#DDC9AE</span></div>
      <div class="step"><div class="chip" style="background:#B89C7A"></div><span class="n">400</span><span class="v">#B89C7A</span></div>
    </div>
    <div class="group-label">Ink · text (warm-tinted, never pure black)</div>
    <div class="scale">
      <div class="step"><div class="chip" style="background:#B8A38C"></div><span class="n">300</span><span class="v">#B8A38C</span></div>
      <div class="step"><div class="chip" style="background:#806753"></div><span class="n">500</span><span class="v">#806753</span></div>
      <div class="step"><div class="chip" style="background:#4F3A2C"></div><span class="n">700</span><span class="v">#4F3A2C</span></div>
      <div class="step"><div class="chip" style="background:#2A1D14"></div><span class="n">900</span><span class="v">#2A1D14</span></div>
      <div class="step"><div class="chip" style="background:linear-gradient(135deg,#FDFAF6,#2A1D14); border-style:dashed"></div><span class="n">range</span><span class="v">cream→ink</span></div>
    </div>
  </div>
</body>
</html>
