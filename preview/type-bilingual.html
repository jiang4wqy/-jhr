<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Type — Bilingual pairing</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px; }
  .card { display: flex; flex-direction: column; gap: 16px; }
  .pair { display: flex; flex-direction: column; gap: 4px; }
  .pair .cn { font-family: 'Noto Sans SC', sans-serif; font-size: 22px; font-weight: 600; color: var(--tc-fg-1); }
  .pair .en { font-family: 'Fraunces', serif; font-style: italic; font-weight: 400; font-size: 16px; color: var(--tc-peach-600); }
  .divider { height: 1px; background: var(--tc-border-1); }
  .note { font-family: var(--tc-font-mono); font-size: 10.5px; color: var(--tc-fg-3); }
</style>
</head>
<body>
  <div class="card">
    <div class="pair">
      <div class="cn">想认识</div>
      <div class="en">would like to know</div>
    </div>
    <div class="divider"></div>
    <div class="pair">
      <div class="cn">今天的三位同学</div>
      <div class="en">Three classmates we'd like you to meet</div>
    </div>
    <div class="divider"></div>
    <div class="pair">
      <div class="cn">慢一点，认真一点</div>
      <div class="en">Slowly, sincerely</div>
    </div>
    <div class="note">CN leads · EN secondary, smaller, often italic. Not parallel translation — tone color.</div>
  </div>
</body>
</html>
