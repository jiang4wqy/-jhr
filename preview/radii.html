<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Radii</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px; }
  .card { display: flex; flex-direction: column; gap: 16px; }
  .scale { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .step { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .chip { width: 64px; height: 64px; background: var(--tc-peach-200); border: 1px solid var(--tc-peach-300); }
  .step .n { font-family: var(--tc-font-mono); font-size: 10px; color: var(--tc-fg-2); font-weight: 600; }
  .step .v { font-family: var(--tc-font-mono); font-size: 9px; color: var(--tc-fg-3); }
  .note { font-family: var(--tc-font-sans); font-size: 12px; color: var(--tc-fg-3); }
</style>
</head>
<body>
  <div class="card">
    <div class="scale">
      <div class="step"><div class="chip" style="border-radius:6px"></div><span class="n">xs</span><span class="v">6</span></div>
      <div class="step"><div class="chip" style="border-radius:10px"></div><span class="n">sm</span><span class="v">10</span></div>
      <div class="step"><div class="chip" style="border-radius:14px"></div><span class="n">md</span><span class="v">14</span></div>
      <div class="step"><div class="chip" style="border-radius:20px"></div><span class="n">lg</span><span class="v">20</span></div>
      <div class="step"><div class="chip" style="border-radius:28px"></div><span class="n">xl</span><span class="v">28</span></div>
      <div class="step"><div class="chip" style="border-radius:40px"></div><span class="n">2xl</span><span class="v">40</span></div>
      <div class="step"><div class="chip" style="border-radius:999px"></div><span class="n">full</span><span class="v">pill</span></div>
    </div>
    <div class="note">Cards use <strong style="color:var(--tc-fg-1)">lg (20)</strong>; profile/hero cards <strong style="color:var(--tc-fg-1)">xl (28)</strong>; buttons <strong style="color:var(--tc-fg-1)">full</strong>.</div>
  </div>
</body>
</html>
