<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Buttons</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px; }
  .card { display: flex; flex-direction: column; gap: 16px; }
  .row-b { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn { font-family: var(--tc-font-sans); font-size: 15px; font-weight: 600; padding: 12px 22px; border-radius: 999px; border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 220ms cubic-bezier(0.16,1,0.3,1); }
  .btn-primary { background: var(--tc-peach-500); color: #fff; }
  .btn-primary:hover { background: var(--tc-peach-400); }
  .btn-secondary { background: var(--tc-cream-100); color: var(--tc-ink-900); }
  .btn-ghost { background: transparent; color: var(--tc-ink-900); border-color: var(--tc-cream-300); }
  .btn-heart { background: transparent; color: var(--tc-rose-500); border-color: var(--tc-rose-300); }
  .btn-heart.on { background: var(--tc-rose-500); color: #fff; border-color: var(--tc-rose-500); }
  .btn-sm { font-size: 13px; padding: 8px 16px; }
  .btn-lg { font-size: 16px; padding: 14px 28px; }
  .heart { width: 16px; height: 16px; }
  .label { font-family: var(--tc-font-mono); font-size: 10.5px; color: var(--tc-fg-3); width: 80px; }
</style>
</head>
<body>
  <div class="card">
    <div class="row-b">
      <span class="label">Primary</span>
      <button class="btn btn-primary">加入同窗</button>
      <button class="btn btn-primary btn-sm">说你好</button>
      <button class="btn btn-primary btn-lg">开始介绍自己</button>
    </div>
    <div class="row-b">
      <span class="label">Secondary</span>
      <button class="btn btn-secondary">稍后再说</button>
      <button class="btn btn-ghost">查看资料</button>
    </div>
    <div class="row-b">
      <span class="label">Heart</span>
      <button class="btn btn-heart"><svg class="heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>想认识</button>
      <button class="btn btn-heart on"><svg class="heart" viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>已表示</button>
    </div>
  </div>
</body>
</html>
