<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Suggestion card</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px; }
  .scard {
    width: 640px;
    background: #fff;
    border: 1px solid var(--tc-border-1);
    border-radius: 24px;
    padding: 16px;
    display: flex;
    gap: 16px;
    align-items: center;
    font-family: var(--tc-font-sans);
  }
  .scard .photo { width: 96px; height: 120px; border-radius: 16px; object-fit: cover; flex-shrink: 0; }
  .scard .info { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .scard .name { font-size: 18px; font-weight: 700; color: var(--tc-ink-900); }
  .scard .meta { font-size: 13px; color: var(--tc-ink-500); }
  .scard .quote { font-family: var(--tc-font-serif); font-style: italic; font-size: 13px; color: var(--tc-ink-700); margin-top: 4px; }
  .scard .actions { display: flex; flex-direction: column; gap: 8px; }
  .iconbtn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--tc-cream-300); background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--tc-ink-700); }
  .iconbtn.heart { color: var(--tc-rose-500); border-color: var(--tc-rose-200); }
  .iconbtn svg { width: 18px; height: 18px; }
  .badge { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--tc-peach-700); background: var(--tc-peach-100); padding: 3px 8px; border-radius: 4px; align-self: flex-start; }
</style>
</head>
<body>
  <div class="scard">
    <img class="photo" src="../assets/placeholders/portrait-02.png" alt="">
    <div class="info">
      <span class="badge">今日推荐</span>
      <div class="name">苏沐 · 22</div>
      <div class="meta">复旦大学 · 新闻学 · 上海</div>
      <div class="quote">"最近在学冲泡手冲咖啡。"</div>
    </div>
    <div class="actions">
      <button class="iconbtn heart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></button>
      <button class="iconbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></button>
    </div>
  </div>
</body>
</html>
